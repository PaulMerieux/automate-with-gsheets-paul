name: Run ETL workflow

on:
  # ──────────────────────────────────────────────────────────────
  # Manual trigger (from the "Actions" tab in GitHub)
  # ──────────────────────────────────────────────────────────────
  workflow_dispatch:

  # ──────────────────────────────────────────────────────────────
  # Scheduled trigger (disabled for now)
  #
  # Uncomment the following lines if you want your ETL
  # to run automatically once per day at 03:00 UTC.
  #
  # schedule:
  #   - cron: "0 3 * * *"
  #
  # Note:
  #   - GitHub Actions uses UTC timezone for cron jobs.
  #   - Adjust the time if needed (e.g., "0 2 * * *" = 3 AM CET).
  # ──────────────────────────────────────────────────────────────
jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          WORKSHEET: ${{ secrets.WORKSHEET }}
          GOOGLE_SA_KEY_JSON: ${{ secrets.GOOGLE_SA_KEY_JSON }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DB: ${{ secrets.DB_DB }}
          DB_TABLE: ${{ secrets.DB_TABLE }}
        run: |
          echo "🚀 Launching ETL pipeline..."
          python etl.py
          echo "✅ ETL finished successfully!"